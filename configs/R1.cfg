access-list 1 permit 192.168.10.0 0.0.0.255
access-list 1 permit 192.168.20.0 0.0.0.255

ip access-list extended BLOCK_SSH
    deny tcp any any eq 22
    permit ip any any
    exit

ip access-list extended AISLAMIENTO_INVITADOS
    permit udp host 0.0.0.0 eq 68 host 255.255.255.255 eq 67
    deny tcp 192.168.20.0 0.0.0.255 host 192.168.20.1 eq 22 log
    deny tcp 192.168.20.0 0.0.0.255 host 192.168.20.1 eq 23 log
    deny ip 192.168.20.0 0.0.0.255 192.68.0.0 0.0.255.255
    deny ip 192.168.20.0 0.0.0.255 10.0.0.0 0.255.255.255
    permit ip 192.168.20.0 0.0.0.255 any
    exit

ip access-list extended AISLAMIENTO_IMPRESORAS
    permit icmp 192.168.30.0 0.0.0.255 192.168.10.0 0.0.0.255 echo-reply
    permit tcp 192.168.30.0 0.0.0.255 192.168.10.0 0.0.0.255 established
    permit tcp 192.168.30.0 0.0.0.255 192.168.10.0 0.0.0.255 eq 445
    permit tcp 192.168.30.0 0.0.0.255 192.168.10.0 0.0.0.255 eq 587
    permit udp 192.168.30.0 0.0.0.255 any eq 53
    permit tcp 192.168.30.0 0.0.0.255 any eq 443
    deny ip 192.168.30.0 0.0.0.255 192.168.0.0 0.0.255.255
    deny ip 192.168.30.0 0.0.0.255 10.0.0.0 0.255.255.255
    exit

ip access-list extended RESTRICCION_LINE_VTY
    permit tcp host 192.168.68.1 any eq 22
    permit tcp host 192.168.10.25 host 10.1.1.1 eq 22
    deny ip any any log
    exit

ip access-list extended ACL_QoS
    permit tcp any any eq 22
    permit tcp any any eq 1022
    permit tcp any any eq 2022
    permit icmp any any
    permit udp any any eq 514
    permit udp any any eq 123
    exit

class-map match-any CLASE_QoS
    match access-group name ACL_QoS
    exit

policy-map POLICY_SOHO_A_WAN
    class CLASE_QoS
        priority percent 10
        exit

    class class-default
        shape average 10000000
        fair-queue
        exit
    exit

ip access-list extended ACL_COPP_ADMIN
    permit tcp any any eq 22
    permit tcp any any eq 1022
    permit tcp any any eq 2022
    permit icmp any any
    exit

class-map match-all CLASE_COPP_ADMIN
    match access-group name ACL_COPP_ADMIN
    exit

policy-map POLIZA_COPP
    class CLASE_COPP_ADMIN
        police 512000 conform-action transmit exceed-action drop
            exit
        exit

    class class-default
        police 8000 conform-action transmit exceed-action drop
            exit
        exit
    exit

control-plane
    service-policy input POLIZA_COPP
    exit
    
interface FastEthernet0/0
    description Conexion a Cloud (WAN)
    ip address dhcp
    ip nat outside
    ip access-group BLOCK_SSH in
    service-policy output POLIZA_SOHO_WAN
    no shutdown
    exit

interface FastEthernet0/1
    no shutdown
    exit
interface FastEthernet0/1.10
    description Gateway VLAN 10 - Datos
    encapsulation dot1q 10
    ip address 192.168.10.1 255.255.255.0
    ip nat inside
    exit
interface FastEthernet0/1.20
    description Gateway VLAN 20 - Invitados
    encapsulation dot1q 20
    ip address 192.168.20.1 255.255.255.0
    ip nat inside
    ip access-group AISLAMIENTO_INVITADOS in
    exit
interface FastEthernet0/1.30
    description Gateway VLAN 30 - Impresoras
    encapsulation dot1q 30
    ip address 192.168.30.1 255.255.255.0
    ip access-group AISLAMIENTO_IMPRESORAS in
    exit
interface FastEthernet0/1.100
    description Gateway VLAN 100 - Gestion
    encapsulation dot1q 100
    ip address 10.2.2.1 255.255.255.252
    exit

interface Loopback 100
    ip address 10.1.1.1 255.255.255.255
    ip nat inside
    exit

line vty 0 15
    access-class RESTRICCION_LINE_VTY in
    transport input ssh
    exit

clock timezone CST -6
ntp server 216.239.35.0

service timestamps debug datetime msec show-timezone
service timestamps log datetime msec show-timezone

logging host 192.168.68.1
logging trap informational
logging source-interface FastEthernet0/0

ip ssh source-interface Loopback 100

ip dhcp excluded-address 192.168.10.1 192.168.10.10
ip dhcp excluded-address 192.168.20.1 192.168.20.10

ip dhcp pool VLAN_10_DATOS
    network 192.168.10.0 255.255.255.0
    default-router 192.168.10.1
    dns-server 8.8.8.8
    exit
ip dhcp pool VLAN_20_INVITADOS
    network 192.168.20.0 255.255.255.0
    default-router 192.168.20.1
    dns-server 8.8.8.8
    exit

ip nat inside source list 1 interface FastEthernet0/0 overload
ip nat inside source static tcp 10.2.2.2 22 interface FastEthernet0/0 2022
ip nat inside source static tcp 10.1.1.1 22 interface FastEthernet0/0 1022

end
write memory
