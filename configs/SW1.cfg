no ip routing

vlan 10
    name Datos
    exit
vlan 20
    name Invitados
    exit
vlan 30
    name Impresoras
    exit
vlan 100
    name Gestion
    exit
vlan 99
    name Blackhole_Troncal
    exit
vlan 999
    name Blackhole_Access
    exit

ip dhcp snooping
ip dhcp snooping vlan 10,20
no ip dhcp snooping information option

ip arp inspection vlan 10,20
ip arp inspection validate src-mac dst-mac ip

arp access-list EXCEPCIONES_ESTATICAS_VLAN10
    permit ip host 192.168.10.10 mac any
    exit

ip arp inspection filter EXCEPCIONES_ESTATICAS_VLAN10 vlan 10

interface GigabitEthernet 0/0
    description UPLINK_R1
    switchport trunk encapsulation dot1q
    switchport mode trunk
    switchport trunk allowed vlan 10,20,30,100
    switchport trunk native vlan 99
    switchport nonegotiate
    ip dhcp snooping trust
    ip arp inspection trust
    no shutdown
    exit

interface range GigabitEthernet 0/1-3
    switchport mode access
    switchport access vlan 999
    switchport nonegotiate
    shutdown
    exit
interface range GigabitEthernet 1/0-3
    switchport mode access
    switchport access vlan 10
    switchport nonegotiate
    switchport port-security maximum 1
    switchport port-security mac-address sticky
    switchport port-security violation restrict
    switchport port-security
    spanning-tree portfast
    spanning-tree bpduguard enable
    no cdp enable
    no lldp transmit
    no lldp receive
    exit
interface range GigabitEthernet 2/0-3
    switchport mode access
    switchport access vlan 20
    switchport nonegotiate
    switchport port-security maximum 1
    switchport port-security mac-address sticky
    switchport port-security violation restrict
    switchport port-security
    spanning-tree portfast
    spanning-tree bpduguard enable
    no cdp enable
    no lldp transmit
    no lldp receive
    exit
interface range GigabitEthernet 3/0-3
    switchport mode access
    switchport access vlan 30
    switchport nonegotiate
    switchport port-security maximum 1
    switchport port-security mac-address sticky
    switchport port-security violation restrict
    switchport port-security
    spanning-tree portfast
    spanning-tree bpduguard enable
    no cdp enable
    no lldp transmit
    no lldp receive
    exit

interface vlan 100
    ip address 10.2.2.2 255.255.255.252
    no shutdown
    exit

ip default-gateway 10.2.2.1

clock timezone CST -6
ntp server 192.168.100.1

service timestamps log datetime msec show-timezone
service timestamps debug datetime msec show-timezone

logging host 192.168.68.1
logging trap informational

errdisable recovery cause bpduguard
errdisable recovery cause psecure-violation
errdisable recovery interval 300

end
write memory
