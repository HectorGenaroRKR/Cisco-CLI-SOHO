interface FastEthernet0/0
    description Conexion a Cloud (WAN)
    ip address dhcp
    ip nat outside
    ip access-group BLOCK_SSH in
    no shutdown
    exit

interface FastEthernet0/1
    no shutdown
    exit
interface FastEthernet0/1.10
    description Gateway VLAN 10 - Datos
    encapsulation dot1q 10
    ip address 192.168.10.1 255.255.255.0
    ip nat inside
    exit
interface FastEthernet0/1.20
    description Gateway VLAN 20 - Invitados
    encapsulation dot1q 20
    ip address 192.168.20.1 255.255.255.0
    ip nat inside
    exit
interface FastEthernet0/1.30
    description Gateway VLAN 30 - Impresoras
    encapsulation dot1q 30
    ip address 192.168.30.1 255.255.255.0
    exit
interface FastEthernet0/1.100
    description Gateway VLAN 100 - Gestion
    encapsulation dot1q 100
    ip address 10.2.2.1 255.255.255.252
    exit

interface Loopback 100
    ip address 10.1.1.1 255.255.255.255
    ip nat inside
    exit

clock timezone CST -6
ntp server 216.239.35.0

service timestamps debug datetime msec show-timezone
service timestamps log datetime msec show-timezone

logging host 192.168.68.1
logging trap informational
logging source-interface FastEthernet0/0

ip dhcp excluded-address 192.168.10.1 192.168.10.10
ip dhcp excluded-address 192.168.20.1 192.168.20.10

ip dhcp pool VLAN_10_DATOS
    network 192.168.10.0 255.255.255.0
    default-router 192.168.10.1
    dns-server 8.8.8.8
    exit
ip dhcp pool VLAN_20_INVITADOS
    network 192.168.20.0 255.255.255.0
    default-router 192.168.20.1
    dns-server 8.8.8.8
    exit

no access-list 1
access-list 1 permit 192.168.10.0 0.0.0.255
access-list 1 permit 192.168.20.0 0.0.0.255

ip access-list extended BLOCK_SSH
    deny tcp any any eq 22
    permit ip any any
    exit

ip nat inside source list 1 interface FastEthernet0/0 overload
ip nat inside source static tcp 10.2.2.2 22 interface FastEthernet0/0 2022
ip nat inside source static tcp 10.1.1.1 22 interface FastEthernet0/0 1022

end
write memory
